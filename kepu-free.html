<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙科百灵鸟 - 免费科普</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
:root{--green:#22C58A;--light:#F0FDF4}
body{background:var(--light);color:#1F2937}
.container{max-width:1100px;margin:0 auto;padding:0 20px}

header{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.05);position:sticky;top:0;z-index:99}
.nav{display:flex;justify-content:space-between;align-items:center;height:70px}
.logo{font-size:24px;font-weight:700;color:var(--green)}
.banner{background:linear-gradient(135deg,#22C58A,#4ADE80);color:#fff;padding:60px 20px;text-align:center}
.banner h1{font-size:30px;margin-bottom:8px}
.banner p{font-size:16px;opacity:0.95}

.section{padding:50px 0}
.title{text-align:center;font-size:24px;font-weight:600;margin-bottom:30px}
.title span{color:var(--green)}

.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.05);margin-bottom:24px;transition:0.3s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;height:200px;object-fit:cover}
.card .c{padding:22px 24px}
.card h3{color:var(--green);font-size:18px;margin-bottom:8px}
.card p{color:#4B5563;line-height:1.7}

.footer{background:#1F2937;color:#fff;text-align:center;padding:40px 20px;font-size:14px}

@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.card{animation:up 0.6s ease backwards}
.card:nth-child(1){animation-delay:0.1s}
.card:nth-child(2){animation-delay:0.2s}
.card:nth-child(3){animation-delay:0.3s}
</style>
</head>

<body>
<header>
  <div class="container nav">
    <div class="logo">🦷 牙科百灵鸟 · 科普</div>
  </div>
</header>

<div class="banner">
  <h1>免费牙齿科普 · 纯公益</h1>
  <p>不收费 · 不推销 · 只为普及科学护牙</p>
</div>

<div class="section container">
  <div class="title">🦷 <span>牙齿基础知识</span></div>

  <div class="card">
    <img src="https://picsum.photos/id/669/800/400">
    <div class="c">
      <h3>蛀牙是怎么形成的</h3>
      <p>蛀牙是细菌利用食物产生酸，长期腐蚀牙齿形成。早补简单便宜，拖久会疼、需根管治疗。</p>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/id/583/800/400">
    <div class="c">
      <h3>牙龈出血多为牙周问题</h3>
      <p>刷牙出血大多不是上火，而是牙结石、牙周炎，需要清洁维护，不是靠吃药降火。</p>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/id/162/800/400">
    <div class="c">
      <h3>智齿要不要拔</h3>
      <p>发炎、疼痛、塞牙、顶坏邻牙建议拔掉；位置正常、无不适可保留。</p>
    </div>
  </div>
</div>

<div class="footer">© 2026 牙科百灵鸟 公益科普版</div>
</body>
</html>
