<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙科百灵鸟 - 官方首页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
:root{--main:#4A90E2;--green:#2EBD85;--dark:#333;--light:#f9f9f9}
body{background:var(--light);color:var(--dark);line-height:1.7}
.container{width:92%;max-width:900px;margin:0 auto}

header{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:20px 0}
.logo{text-align:center;font-size:30px;font-weight:bold;color:var(--main)}
.desc{text-align:center;margin-top:8px;color:#666}

.main{padding:60px 0}
.box-group{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px}
.box{border-radius:20px;padding:40px 30px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,.06)}
.box-free{background:linear-gradient(135deg,#fff,#f0faf4);border:2px solid var(--green)}
.box-pay{background:linear-gradient(135deg,#fff,#f0f7ff);border:2px solid var(--main)}

.box h2{font-size:24px;margin-bottom:15px}
.box p{color:#555;margin-bottom:25px}
.btn{display:inline-block;padding:14px 32px;border-radius:30px;text-decoration:none;font-size:16px;font-weight:bold}
.btn-free{background:var(--green);color:#fff}
.btn-pay{background:var(--main);color:#fff}

.footer{text-align:center;padding:40px 20px;color:#888}
</style>
</head>

<body>

<header>
  <div class="container">
    <div class="logo">🦷 牙科百灵鸟</div>
    <div class="desc">专业口腔科普 · 在线付费咨询</div>
  </div>
</header>

<div class="main">
  <div class="container">
    <div class="box-group">

      <!-- 免费科普版 -->
      <div class="box box-free">
        <h2>✅ 免费科普</h2>
        <p>纯公益护牙知识<br>无收费、无广告、无推广</p>
        <a href="kepu-free.html" class="btn btn-free">进入科普站</a>
      </div>

      <!-- 付费咨询版 -->
      <div class="box box-pay">
        <h2>💬 付费咨询</h2>
        <p>牙医在线解答问题<br>方案分析 + 看牙避坑</p>
        <a href="zixun.html" class="btn btn-pay">进入咨询站</a>
      </div>

    </div>
  </div>
</div>

<div class="footer">
  © 2026 牙科百灵鸟 版权所有
</div>

</body>
</html>
