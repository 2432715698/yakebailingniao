<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙科百灵鸟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
:root{--blue:#3A8EF6;--green:#22C58A;--dark:#1F2937}
body{background:#F9FAFB;color:var(--dark)}
.container{max-width:900px;margin:0 auto;padding:0 20px}

header{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.05);padding:22px 0}
.logo{text-align:center;font-size:28px;font-weight:700;color:var(--blue)}
.sub{text-align:center;color:#6B7280;margin-top:6px}

.hero{padding:60px 0 30px;text-align:center;animation:fadeIn 0.8s ease}
.hero h1{font-size:32px;margin-bottom:10px}
.hero p{color:#6B7280;font-size:16px}

.card-group{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:20px 0 60px}
.card{border-radius:20px;padding:40px 24px;text-align:center;transition:all 0.3s ease;box-shadow:0 6px 20px rgba(0,0,0,0.06)}
.card:hover{transform:translateY(-6px)}
.card-green{border:1px solid #D1FAE5;background:#fff}
.card-blue{border:1px solid #DBEAFE;background:#fff}
.card h2{font-size:22px;margin-bottom:10px}
.card p{color:#6B7280;margin-bottom:24px}
.btn{display:inline-block;padding:12px 26px;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}

.footer{text-align:center;padding:40px 20px;color:#9CA3AF;font-size:14px}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<body>
<header>
  <div class="container">
    <div class="logo">🦷 牙科百灵鸟</div>
    <div class="sub">口腔科普 · 专业咨询</div>
  </div>
</header>

<div class="hero container">
  <h1>欢迎来到牙科百灵鸟</h1>
  <p>免费学护牙知识，付费找专业解答</p>
</div>

<div class="container card-group">
  <div class="card card-green" style="animation:fadeIn 0.7s ease 0.1s both">
    <h2>✅ 免费科普</h2>
    <p>纯公益牙齿知识<br>无广告、无收费</p>
    <a href="kepu-free.html" class="btn btn-green">进入科普站</a>
  </div>

  <div class="card card-blue" style="animation:fadeIn 0.7s ease 0.2s both">
    <h2>💬 付费咨询</h2>
    <p>牙医在线解答<br>分析方案、看牙避坑</p>
    <a href="zixun.html" class="btn btn-blue">进入咨询站</a>
  </div>
</div>

<div class="footer">© 2026 牙科百灵鸟 版权所有</div>
</body>
</html>
